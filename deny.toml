# cargo-deny configuration (schema for cargo-deny >= 0.18 / action v2).

[advisories]
# Security vulnerabilities are always denied. Add RUSTSEC ids here to ignore.
ignore = []

[licenses]
# Permissive licenses only; every crate in the graph must resolve to one of these.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
